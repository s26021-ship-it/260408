<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{
            font-family: "나눔고딕코딩", "굴림체";

        }

        h3{
            font : italic bold 40px "국대떡볶이체","궁서체";
        }
    </style>
</head>
<body>
    <h3>여러가지 스타일</h3>

    <p style="font-style:italic">이텔릭체</p> <!--글씨를 한땀한땀 기울임-->
    <p style="font-style: oblique">oblique이 뭔가요?</p> <!--그냥 통째로 기울임-->
    <p>글씨가 작아졌습니다 현재 크기의
        <span style="font-size:0.5em">0.5배</span>로
    </p>
